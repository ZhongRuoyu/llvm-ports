name: Build and push Docker images for a LLVM version, base image, and configuration

on:
  workflow_call:
    inputs:
      llvm-version:
        type: string
      base-image-tag:
        type: string
      llvm-configuration:
        type: string
      push:
        type: boolean

concurrency:
  group: ${{ github.workflow }}-build-${{ inputs.llvm-version }}-${{ inputs.base-image-tag }}-${{ inputs.llvm-configuration }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: zhongruoyu
  DOCKERHUB_REPOSITORY: zhongruoyu/llvm-ports
  GHCR_USERNAME: zhongruoyu
  GHCR_REPOSITORY: ghcr.io/zhongruoyu/llvm-ports
  BUILD_CACHE_REPOSITORY: ghcr.io/zhongruoyu/llvm-ports/cache
  BUILD_CONFIG: ${{ inputs.llvm-version }}${{ inputs.llvm-configuration == 'slim' && '-slim' || '' }}-${{ inputs.base-image-tag }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
    name: >
      Build ${{ inputs.llvm-version }} - ${{ inputs.base-image-tag }}
      ${{ inputs.llvm-configuration && format(' ({0})', inputs.llvm-configuration) || '' }}
      (${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      contents: read
      packages: write
    env:
      LLVM_VERSION: ${{ inputs.llvm-version }}
      BASE_IMAGE_TAG: ${{ inputs.base-image-tag }}
      ARCH: ${{ matrix.arch }}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/local/lib/android
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Load build environment
        run: cat build.env >> "$GITHUB_ENV"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to Docker Hub
        if: inputs.push
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ github.token }}
      - name: Set up build
        id: setup
        run: |
          {
            echo "cache_from=type=registry,ref=$BUILD_CACHE_REPOSITORY:$BUILD_CONFIG-$ARCH"
            if [[ "$PUSH" = true ]]; then
              echo "cache_to=type=registry,ref=$BUILD_CACHE_REPOSITORY:$BUILD_CONFIG-$ARCH,mode=max"
              echo "outputs<<OUTPUTS"
              echo "type=image,name=$DOCKERHUB_REPOSITORY,name-canonical=true,push=true,push-by-digest=true"
              echo "type=image,name=$GHCR_REPOSITORY,name-canonical=true,push=true,push-by-digest=true"
              echo "OUTPUTS"
            else
              echo "cache_to="
              echo "outputs="
            fi
          } >> "$GITHUB_OUTPUT"
        env:
          PUSH: ${{ inputs.push }}
      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          platforms: linux/${{ matrix.arch }}
          build-args: |
            BASE_IMAGE=public.ecr.aws/docker/library/buildpack-deps:${{ env.BASE_IMAGE_TAG }}
            LLVM_VERSION
            BINUTILS_VERSION
            CMAKE_VERSION
            EXTRA_CMAKE_ARGS=${{ inputs.llvm-configuration == 'slim' && '-DLLVM_LINK_LLVM_DYLIB=ON' || '' }}
          cache-from: ${{ steps.setup.outputs.cache_from }}
          cache-to: ${{ steps.setup.outputs.cache_to }}
          outputs: ${{ steps.setup.outputs.outputs }}
      - name: Export digest
        run: |
          mkdir -p "$RUNNER_TEMP"/digests
          echo "${DIGEST#sha256:}" > "$RUNNER_TEMP/digests/$BUILD_CONFIG-$ARCH"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ env.BUILD_CONFIG }}-${{ env.ARCH }}
          path: ${{ runner.temp }}/digests/*

  merge:
    if: inputs.push
    needs: build
    name: >
      Merge ${{ inputs.llvm-version }} - ${{ inputs.base-image-tag }}
      ${{ inputs.llvm-configuration && format(' ({0})', inputs.llvm-configuration) || '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      LLVM_VERSION: ${{ inputs.llvm-version }}
      BASE_IMAGE_TAG: ${{ inputs.base-image-tag }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ github.token }}
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-${{ env.BUILD_CONFIG }}-*
          merge-multiple: true
      - name: Create manifest list and push
        run: |
          LLVM_VERSION_MAJOR="$(echo "$LLVM_VERSION" | cut -d '.' -f 1)"
          LLVM_VERSION_MAJOR_MINOR="$(echo "$LLVM_VERSION" | cut -d '.' -f 1-2)"
          docker buildx imagetools create \
            --tag="$DOCKERHUB_REPOSITORY:$BUILD_CONFIG" \
            --tag="$DOCKERHUB_REPOSITORY:$LLVM_VERSION_MAJOR_MINOR$CONFIG_SUFFIX-$BASE_IMAGE_TAG" \
            --tag="$DOCKERHUB_REPOSITORY:$LLVM_VERSION_MAJOR$CONFIG_SUFFIX-$BASE_IMAGE_TAG" \
            --tag="$GHCR_REPOSITORY:$BUILD_CONFIG" \
            --tag="$GHCR_REPOSITORY:$LLVM_VERSION_MAJOR_MINOR$CONFIG_SUFFIX-$BASE_IMAGE_TAG" \
            --tag="$GHCR_REPOSITORY:$LLVM_VERSION_MAJOR$CONFIG_SUFFIX-$BASE_IMAGE_TAG" \
            "$GHCR_REPOSITORY@sha256:$(cat "$RUNNER_TEMP/digests/$BUILD_CONFIG-x86_64")" \
            "$GHCR_REPOSITORY@sha256:$(cat "$RUNNER_TEMP/digests/$BUILD_CONFIG-aarch64")"
        env:
          CONFIG_SUFFIX: ${{ inputs.llvm-configuration == 'slim' && '-slim' || '' }}
